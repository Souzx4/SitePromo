<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACESSO VIP: Ofertas Exclusivas e Cupons</title>
    <style>
        /* CSS: Estilo Premium e Interação Moderna */
        :root {
            /* Cores de Alto Contraste e Neon */
            --bg-dark: #020617;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --neon-blue: #0ea5e9;
            --neon-purple: #a855f7;
            --telegram-btn: #0088cc;
            --secondary-btn: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent; /* Remove flash no mobile */
        }

        body {
            background-color: var(--bg-dark);
            /* Fundo com gradiente radial neon */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(14, 165, 233, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Container Principal com Efeito Glassmorphism */
        .glass-container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 32px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 50px 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
        }

        /* Perfil Neon */
        .profile-neon {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin: 0 auto 25px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            background: rgba(0,0,0,0.5);
        }

        .profile-neon::before {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            z-index: -1;
            filter: blur(10px);
            opacity: 0.8;
            animation: neon-pulse 3s infinite;
        }

        @keyframes neon-pulse {
            0%, 100% { filter: blur(10px); opacity: 0.8; }
            50% { filter: blur(15px); opacity: 1; }
        }

        /* Títulos e Chamadas */
        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 12px;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 .highlight {
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 35px;
            line-height: 1.5;
        }

        /* Wrapper de Botões Interativos */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* Estilo Base do Botão */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            border: 1px solid transparent;
        }

        /* Efeito de flutuação ao passar o mouse (desktop) */
        .btn:hover {
            transform: translateY(-5px) scale(1.02);
        }

        /* Botão Telegram Principal (A Grande Chamada) */
        .btn-main-telegram {
            background-color: var(--telegram-btn);
            box-shadow: 0 10px 30px rgba(0, 136, 204, 0.3);
            overflow: hidden;
        }

        /* Efeito de Brilho Passante (Gatilho Visual) */
        .btn-main-telegram::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.13) 77%, rgba(255,255,255,0.5) 100%);
            transform: rotate(-30deg);
            transition: transform 0.7s;
            animation: shine-effect 3s infinite;
        }

        @keyframes shine-effect {
            0% { transform: translateX(-150%) rotate(-30deg); }
            100% { transform: translateX(150%) rotate(-30deg); }
        }

        .btn-main-telegram:hover {
            background-color: #0099e6;
            box-shadow: 0 15px 40px rgba(0, 136, 204, 0.5);
        }

        /* Botões Secundários */
        .btn-secondary {
            background-color: var(--secondary-btn);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* Componente de Prova Social Simulada (Notificação) */
        .notification-toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 100;
            transition: bottom 0.5s ease-out;
            white-space: nowrap;
        }

        .notification-toast.show {
            bottom: 30px;
        }

        .notification-toast .icon-spin {
            animation: spin 1s linear infinite;
            color: var(--neon-blue);
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="glass-container">
        <div class="profile-neon">💸</div>
        
        <h1>O Segredo para <span class="highlight">Pagar Menos</span></h1>
        <p class="subtitle">Cupons secretos, erros de preço e promoções relâmpago. Garanta seu acesso VIP agora.</p>

        <div class="links-wrapper">
            <a href="COLOQUE_O_LINK_DO_TELEGRAM_AQUI" class="btn btn-main-telegram" target="_blank">
                📱 ENTRAR NO GRUPO VIP (GRÁTIS)
            </a>

            <a href="COLOQUE_OUTRO_LINK_AQUI" class="btn btn-secondary" target="_blank">
                💻 Só Eletrônicos & Tech
            </a>
            
            <a href="COLOQUE_OUTRO_LINK_AQUI" class="btn btn-secondary" target="_blank">
                🏠 Só Casa & Utilidades
            </a>
        </div>
    </div>

    <div id="socialNotification" class="notification-toast">
        <span class="icon-spin">⏳</span>
        <span id="notificationText">Verificando novas ofertas...</span>
    </div>

    <script>
        // JAVASCRIPT: Lógica de Prova Social Simulada (Aumenta o Clicke)
        
        const toast = document.getElementById('socialNotification');
        const textSpan = document.getElementById('notificationText');
        
        // Frases que geram FOMO (Medo de Perder) e Prova Social
        const messages = [
            "🔥 Novo erro de preço detectado no Grupo 1!",
            "✨ Cupom de 60% OFF postado agora!",
            "👤 14 pessoas acabaram de entrar no VIP.",
            "💻 Oferta relâmpago de Notebook postada!",
            "⚠️ O estoque da última oferta está acabando...",
            "👤 Alguém economizou R$ 350 na última hora."
        ];

        function showNotification() {
            // Seleciona uma mensagem aleatória
            const randomMessage = messages[Math.floor(Math.random() * messages.length)];
            textSpan.textContent = randomMessage;
            
            // Mostra o toast
            toast.classList.add('show');
            
            // Esconde o toast após 4 segundos
            setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        // Inicia o ciclo de notificações (Uma a cada 12 segundos)
        // A primeira aparece após 3 segundos da página aberta
        setTimeout(() => {
            showNotification();
            setInterval(showNotification, 12000); 
        }, 3000);

    </script>

</body>
</html>
